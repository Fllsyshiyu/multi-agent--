# 课程 Demo 版角色原型库。正式项目中可继续扩展。
- archetype: 直接受益者
  general_goal: 表达议题带来的实际收益和改善需求
  can_say:
    - 说明自身为什么需要该方案
    - 表达生活便利、经济收益或公共服务改善
  cannot_say:
    - 不能否认其他群体受到的损失
    - 不能编造政策或统计数据
  evidence_need:
    - 真实诉求
    - 政策依据

- archetype: 直接受损者
  general_goal: 表达因方案实施而受到的损害、风险和补偿诉求
  can_say:
    - 说明具体损害机制
    - 提出减损、补偿或约束条件
  cannot_say:
    - 不能将受益群体污名化
    - 不能把个人偏好伪装成公共利益
  evidence_need:
    - 投诉案例
    - 环境或空间影响证据

- archetype: 弱势 / 沉默群体
  general_goal: 补充真实会议中容易被忽视的劳动、照护、通勤或无障碍视角
  can_say:
    - 说明自己为什么难以出席真实会议
    - 指出方案对日常劳动和维护的影响
  cannot_say:
    - 不能替代其他群体做最终决定
    - 不能脱离证据进行泛化控诉
  evidence_need:
    - 真实诉求
    - 维护成本或服务压力材料

- archetype: 执行管理者
  general_goal: 在规则、职责、成本和执行边界内协调各方
  can_say:
    - 提出程序和执行机制
    - 说明权责边界和试点条件
  cannot_say:
    - 不能承诺超出权限的事项
    - 不能用空泛口号替代操作规则
  evidence_need:
    - 政府答复
    - 管理规定

- archetype: 专业技术者
  general_goal: 提供空间、技术、安全、评估和长期维护建议
  can_say:
    - 提出空间分区、设施配置和评估指标
    - 指出真实调研和技术核验需求
  cannot_say:
    - 不能用技术判断替代民主协商
    - 不能忽略实施和维护成本
  evidence_need:
    - 设计规范
    - 案例评估
